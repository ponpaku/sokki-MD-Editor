<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marka</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="help-toggle">?</div>
<div id="help-panel"></div>

<header>
    <div style="display: flex; align-items: center; gap: 8px;">
        <button id="btn-sidebar-toggle" class="btn" data-i18n-title="sidebar.toggleTitle" title="Toggle Sidebar">&#9776;</button>
        <strong>Marka</strong>
    </div>
    <div style="display: flex; align-items: center;">
        <div id="status" data-i18n="status.ready">Ready</div>
        <div class="btn-group">
            <button class="btn" id="btn-new" data-i18n="btn.new">New</button>
            <button class="btn" id="btn-open" data-i18n="btn.open">Open</button>
            <button class="btn" id="btn-save" data-i18n="btn.save">Save</button>
            <button class="btn" id="btn-save-as" data-i18n="btn.saveAs">Save As</button>
            <div class="export-wrapper">
                <button class="btn" id="btn-export" data-i18n="btn.export">Export</button>
                <div class="export-dropdown" id="export-dropdown">
                    <button class="export-option" id="export-docx" data-i18n="export.word">Word (.docx)</button>
                    <button class="export-option" id="export-txt" data-i18n="export.plainText">Plain Text (.txt)</button>
                    <button class="export-option" id="export-pdf" data-i18n="export.pdf">PDF</button>
                    <button class="export-option" id="export-html" data-i18n="export.html">HTML</button>
                    <button class="export-option" id="export-print" data-i18n="export.print">Print</button>
                </div>
            </div>
            <button id="btn-settings" class="toolbar-icon-btn" data-i18n-title="settings.open" title="Settings">&#9881;</button>
            <button id="theme-toggle" data-i18n-title="btn.themeToggle" title="Toggle theme"></button>
        </div>
    </div>
</header>

<div class="app-body">
    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-tab-bar">
            <button class="sidebar-tab active" data-tab="files" data-i18n="sidebar.files">ファイル</button>
            <button class="sidebar-tab" data-tab="toc" data-i18n="sidebar.toc">目次</button>
        </div>
        <div id="sidebar-content">
            <!-- Files panel — workspace-area / resize-handle / recent-area injected by sidebar.js -->
            <div id="sidebar-files" class="sidebar-panel">
                <div id="sidebar-files-toolbar">
                    <button id="btn-open-workspace" data-i18n-title="sidebar.openFolder" title="Open Folder">&#128193;</button>
                </div>
            </div>
            <!-- TOC panel -->
            <div id="sidebar-toc" class="sidebar-panel hidden">
                <div id="toc-list"></div>
            </div>
        </div>
        <div id="sidebar-about-footer">
            <button id="btn-about"><span class="about-btn-icon">i</span><span data-i18n="about.menuLabel">このアプリについて</span></button>
        </div>
    </div>

    <!-- About Modal -->
    <div id="about-modal" class="about-overlay" aria-modal="true" role="dialog">
        <div class="about-dialog">
            <div class="about-header">
                <span class="about-title" data-i18n="about.title">About Marka</span>
                <button id="about-close" class="about-close-btn" data-i18n-title="about.close" title="Close">&times;</button>
            </div>
            <div class="about-body">
                <div class="about-app-name">Marka</div>
                <table class="about-table">
                    <tr>
                        <th data-i18n="about.version">Version</th>
                        <td id="about-version">—</td>
                    </tr>
                    <tr>
                        <th data-i18n="about.author">Author</th>
                        <td>ponpaku</td>
                    </tr>
                    <tr>
                        <th data-i18n="about.repository">Repository</th>
                        <td>
                            <span id="about-repo-url" class="about-url">https://github.com/ponpaku/marka</span>
                            <button id="about-copy-url" class="about-copy-btn" data-i18n="about.copyUrl">Copy</button>
                        </td>
                    </tr>
                    <tr>
                        <th data-i18n="about.license">License</th>
                        <td>MIT</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="settings-overlay" aria-modal="true" role="dialog">
        <div class="settings-dialog">
            <div class="settings-header">
                <span class="settings-title" data-i18n="settings.title">Settings</span>
                <button id="settings-close" class="settings-close-btn" data-i18n-title="settings.close" title="Close">&times;</button>
            </div>
            <div class="settings-body">
                <section class="settings-section">
                    <div class="settings-section-label" data-i18n="settings.editor">Editor</div>
                    <label class="settings-field">
                        <span data-i18n="settings.displayFont">Display Font</span>
                        <select id="settings-display-font" class="settings-select"></select>
                    </label>
                    <label class="settings-field">
                        <span data-i18n="settings.fontSize">Font Size</span>
                        <div class="settings-font-size-row">
                            <input type="range" id="settings-font-size" min="12" max="28" step="1">
                            <output id="settings-font-size-value" for="settings-font-size">16px</output>
                        </div>
                    </label>
                    <label class="settings-checkbox">
                        <input type="checkbox" id="settings-line-numbers">
                        <span data-i18n="settings.lineNumbers">Show line numbers</span>
                    </label>
                    <label class="settings-checkbox">
                        <input type="checkbox" id="settings-line-wrapping">
                        <span data-i18n="settings.lineWrapping">Enable line wrapping</span>
                    </label>
                </section>
                <section class="settings-section">
                    <div class="settings-section-label" data-i18n="settings.interface">Interface</div>
                    <label class="settings-field">
                        <span data-i18n="settings.language">UI Language</span>
                        <select id="settings-language" class="settings-select">
                            <option value="ja" data-i18n="settings.languageJapanese">Japanese</option>
                            <option value="en" data-i18n="settings.languageEnglish">English</option>
                        </select>
                    </label>
                </section>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="workspace-split">
            <div id="editor-pane">
                <div id="editor" aria-label="Markdown editor"></div>
            </div>
            <div id="divider"></div>
            <div id="preview-wrapper">
                <button id="preview-style-toggle" title="Preview Style">&#x1f3a8;</button>
                <div id="preview-style-panel" class="psp-panel"></div>
                <div id="preview-pane"></div>
            </div>
        </div>
        <div id="editor-footer">
            <div class="editor-footer-actions">
                <button id="btn-search" class="editor-footer-btn" data-i18n="footer.search">検索</button>
            </div>
            <div id="editor-char-count" data-i18n="footer.charCount">0 文字</div>
        </div>
    </div>
</div>

<!-- Export Modal -->
<div id="export-modal" class="em-overlay">
    <div class="em-dialog">
        <div class="em-header">
            <h3 id="em-title" class="em-title">Export</h3>
            <button id="em-close" class="em-close-btn">&times;</button>
        </div>
        <div class="em-body">
            <div class="em-settings">
                <div class="em-section-label" data-i18n="exportModal.pageSize">Page Size</div>
                <select id="em-page-size" class="em-select">
                    <option value="a4" selected>A4 (210 × 297 mm)</option>
                    <option value="a3">A3 (297 × 420 mm)</option>
                    <option value="b4">B4 (250 × 353 mm)</option>
                    <option value="b5">B5 (176 × 250 mm)</option>
                    <option value="letter">Letter (215.9 × 279.4 mm)</option>
                    <option value="legal">Legal (215.9 × 355.6 mm)</option>
                </select>
                <div class="em-section-label" data-i18n="exportModal.margins">Margins (mm)</div>
                <div class="em-margin-grid">
                    <label><span data-i18n="exportModal.top">Top</span><input type="number" id="em-margin-top" value="15" min="0" max="100"></label>
                    <label><span data-i18n="exportModal.right">Right</span><input type="number" id="em-margin-right" value="15" min="0" max="100"></label>
                    <label><span data-i18n="exportModal.bottom">Bottom</span><input type="number" id="em-margin-bottom" value="15" min="0" max="100"></label>
                    <label><span data-i18n="exportModal.left">Left</span><input type="number" id="em-margin-left" value="15" min="0" max="100"></label>
                </div>
                <div class="em-section-label" data-i18n="exportModal.scale">Scale (%)</div>
                <input type="range" id="em-scale" min="50" max="200" value="100" class="em-range">
                <div class="em-scale-value"><span id="em-scale-label">100</span>%</div>
                <div class="em-section-label" data-i18n="exportModal.dpi">DPI (Resolution)</div>
                <select id="em-dpi" class="em-select">
                    <option value="1">72 DPI</option>
                    <option value="2" selected>150 DPI</option>
                    <option value="3">216 DPI</option>
                    <option value="4">300 DPI</option>
                </select>
                <label class="em-checkbox-label">
                    <input type="checkbox" id="em-use-preview-style" checked>
                    <span data-i18n="exportModal.usePreviewStyle">Use preview style</span>
                </label>
                <label class="em-checkbox-label">
                    <input type="checkbox" id="em-avoid-break-inside">
                    <span data-i18n="exportModal.avoidBreakInside">Avoid breaking inside elements</span>
                </label>
                <div class="em-actions">
                    <button class="em-btn em-btn-primary" id="em-export" data-i18n="exportModal.export">Export</button>
                    <button class="em-btn em-btn-secondary" id="em-cancel" data-i18n="exportModal.cancel">Cancel</button>
                </div>
            </div>
            <div class="em-preview-area">
                <div class="em-section-label" data-i18n="exportModal.preview">Preview</div>
                <div class="em-preview-frame-wrapper">
                    <iframe id="em-preview-frame" class="em-preview-frame"></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
